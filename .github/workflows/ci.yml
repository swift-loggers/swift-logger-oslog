name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Change detection -- skip expensive CI for draft PRs and for
  # changes that do not touch code, configs, or workflows.
  changes:
    name: Detect Changes
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      ci_relevant: ${{ steps.filter.outputs.ci_relevant }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci_relevant:
              - 'Package.swift'
              - 'Package.resolved'
              - 'Sources/**'
              - 'Tests/**'
              - '.github/workflows/**'
              - '.swiftformat'
              - '.swiftlint.yml'
              - '.swift-version'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true' || github.event.action == 'ready_for_review'
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Install SwiftFormat and SwiftLint
        run: brew install swiftformat swiftlint

      - name: Lint tool versions
        run: |
          swiftformat --version
          swiftlint version

      - name: SwiftFormat lint
        run: swiftformat --lint . --config .swiftformat

      - name: SwiftLint strict
        run: swiftlint --strict

      - name: Whitespace check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --depth=1 origin "${{ github.base_ref }}"
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff --check "${{ github.event.before }}" "${{ github.sha }}"
          fi

  test:
    name: Test (strict concurrency)
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true' || github.event.action == 'ready_for_review'
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Test
        run: swift test -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

  build-release:
    name: Build (release)
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true' || github.event.action == 'ready_for_review'
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build release
        run: swift build -c release -Xswiftc -warnings-as-errors

  library-evolution:
    name: Build (library evolution)
    needs: changes
    if: needs.changes.outputs.ci_relevant == 'true' || github.event.action == 'ready_for_review'
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build with library evolution
        run: swift build -Xswiftc -enable-library-evolution -Xswiftc -emit-module-interface -Xswiftc -warnings-as-errors

  docc:
    name: DocC (${{ matrix.product }})
    needs: changes
    if: github.event_name == 'pull_request' && (needs.changes.outputs.ci_relevant == 'true' || github.event.action == 'ready_for_review')
    runs-on: macos-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        product: [LoggerOSLog]
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: DocC build
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target ${{ matrix.product }} \
            --warnings-as-errors
