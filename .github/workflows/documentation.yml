name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build DocC
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build documentation
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target LoggerOSLog \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path swift-logger-oslog \
            --output-path ./docs \
            --warnings-as-errors

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
